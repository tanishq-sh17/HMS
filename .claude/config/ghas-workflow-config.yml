# GHAS Workflow Configuration
# Edit this file to customize Jira ticket structure and workflow behaviour.
# Read by jira_ticket_manager.py, w1-jira-manager, and w2 agents.

jira:
  project_key: HMS
  site_url: https://tanishqshrivas.atlassian.net

  labels: [GHAS]
  # service name is always appended automatically as an additional label

  assignee: null        # null = unassigned; set to Jira accountId to auto-assign
  parent_jira: null     # parent epic key e.g. HMS-5
  story_points: null
  team: null

  # Priority is set by business — all GHAS tickets default to High
  priority: High

  # Jira ticket description — which columns to show in the Dependabot alert table
  # Available: ghsa_id, cve_id, title, severity, created, due, ageDays, nonCompliant, url
  template:
    include_columns: [ghsa_id, cve_id, title]

  # Duplicate check — skip creating a new ticket if existing one is in any of these statuses
  # Teams can add or remove statuses to match their Jira board configuration
  skip_statuses_for_duplicate_check:
    - To Do
    - Funnel
    - Analysis
    - In Dev
    - Blocked
    - On Hold

workflow:
  build_tool: maven     # maven | gradle  (used by Workflow 2)
  maven_path: mvn       # override if mvn is not on PATH (e.g. C:\apache-maven\bin\mvn)
  gradle_path: ./gradlew  # relative path to gradlew for Gradle projects
  test_command: null    # null = use default (mvn test / gradle test); set to override
  smoke_check_url: http://localhost:8080/api/v1/actuator/health
  smoke_check_timeout_seconds: 60
  auto_approve_minor: false   # skip human approval gate for MINOR version upgrades
  auto_approve_critical: false  # auto-approve CRITICAL fixes without prompting

